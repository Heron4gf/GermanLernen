services:
  api:
    build: ./backend
    networks:
      - app-net
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DB_URL=sqlite:////app/data/cards.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    networks:
      - app-net
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:

networks:
  app-net:
    driver: bridge