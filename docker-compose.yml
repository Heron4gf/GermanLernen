services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DB_URL=sqlite:////app/data/cards.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://5.75.173.83:8000
    ports:
      - "2372:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data: